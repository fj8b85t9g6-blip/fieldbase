<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#1e3a5f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FieldBase">
    <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192.png">
    <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
  <title>FieldBase — Sign In</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f6f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 16px; }
    .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); padding: 40px 28px; width: 100%; max-width: 400px; }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo h1 { font-size: 28px; font-weight: 700; color: #1e3a5f; letter-spacing: -0.5px; }
    .logo p { color: #6b7280; font-size: 14px; margin-top: 4px; }
    .flash { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; padding: 10px 14px; border-radius: 6px; font-size: 14px; margin-bottom: 20px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    input { width: 100%; padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 15px; margin-bottom: 18px; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: #1e3a5f; }
    button { width: 100%; padding: 12px; background: #1e3a5f; color: #fff; border: none; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    button:hover { background: #163055; }
    .footer { text-align: center; margin-top: 24px; font-size: 14px; color: #6b7280; }
    .footer a { color: #1e3a5f; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>FieldBase</h1>
      <p>Field Service Management</p>
    </div>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}
    <form method="POST" action="/login">
      <label>Email Address</label>
      <input type="email" name="email" required placeholder="you@company.com" autocomplete="email">
      <label>Password</label>
      <input type="password" name="password" required placeholder="••••••••" autocomplete="current-password">
      <button type="submit">Sign In</button>
    </form>
    <div class="footer">
      New business? <a href="/register">Create an account</a>
    </div>
  </div>
</body>
</html>
